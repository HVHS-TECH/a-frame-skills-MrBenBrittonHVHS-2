<!DOCTYPE html>
<html>

<head>
  <title>3D Model - OBJ</title>
  <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
</head>

<body>
  <a-scene>
    <a-sky color="lightblue"></a-sky>

    <a-scene>
      <a-assets>
        <a-asset-item id="vox-obj" src="Starter.obj"></a-asset-item>
        <a-asset-item id="vox-mtl" src="Starter.mtl"></a-asset-item>
      </a-assets>

      <a-obj-model src="#vox-obj" mtl="#vox-mtl" position="0 0 -3" scale="1 1 1">
      </a-obj-model>

      <a-entity 
      ply-model="src:dog.ply" 
      position="-4 0 -3" 
      rotation="-90 0 140" 
      scale="1 1 1"
      ></a-entity>
    </a-scene>


</body>

</html>
